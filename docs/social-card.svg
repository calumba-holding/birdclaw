<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">birdclaw social card</title>
  <desc id="desc">birdclaw: Your Twitter, in a SQLite file. Local-first archive, cached live reads, focused triage, and reply flows in one CLI + web app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#eaf5fe"/>
      <stop offset="1" stop-color="#dceffd"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1419"/>
      <stop offset="1" stop-color="#070b10"/>
    </linearGradient>
    <linearGradient id="panelBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181c"/>
      <stop offset="1" stop-color="#0f1419"/>
    </linearGradient>
    <linearGradient id="birdySweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d9bf0"/>
      <stop offset="0.5" stop-color="#71c9f8"/>
      <stop offset="1" stop-color="#f4212e"/>
    </linearGradient>
    <linearGradient id="brandTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d9bf0"/>
      <stop offset="1" stop-color="#1a8cd8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0a3656" flood-opacity="0.20"/>
    </filter>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0a3656" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative feather, very subtle, in lower-left -->
  <g transform="translate(-60 460) rotate(-18)" opacity="0.08">
    <path fill="#1d9bf0" d="M163 22c-30 4-58 19-78 41C53 88 41 117 47 144l-21 21c-3 3-3 7 0 10s7 3 10 0l21-21c27 6 56-6 81-32 22-22 36-49 41-79 1-9-7-15-16-21zM84 130c-1 0-2 0-3-1-1-2-1-4 1-5l60-60c1-1 4-1 5 1 1 2 1 4-1 5l-60 60c-1 1-2 1-2 0z"/>
  </g>

  <!-- Brand mark (top-left): blue tile with white bird -->
  <g transform="translate(76 76)" filter="url(#tileShadow)">
    <rect x="0" y="0" width="118" height="118" rx="26" fill="url(#brandTile)"/>
    <g transform="translate(20 22) scale(3.2)">
      <path fill="#ffffff" d="M21.3 4.2c-.7.3-1.5.5-2.3.6.8-.5 1.5-1.3 1.8-2.2-.8.5-1.7.8-2.6 1A4.1 4.1 0 0 0 11.1 7c0 .3 0 .6.1.9A11.7 11.7 0 0 1 2.7 3.6c-.4.7-.6 1.5-.6 2.3 0 1.4.7 2.7 1.8 3.4-.7 0-1.3-.2-1.9-.5v.1c0 2 1.4 3.7 3.3 4.1-.4.1-.7.1-1.1.1-.3 0-.5 0-.8-.1.5 1.6 2 2.8 3.8 2.8a8.3 8.3 0 0 1-5.1 1.7c-.3 0-.7 0-1-.1A11.7 11.7 0 0 0 7.5 19c7.6 0 11.7-6.3 11.7-11.7v-.5c.8-.6 1.5-1.3 2.1-2.1z"/>
    </g>
  </g>

  <!-- Title -->
  <text x="76" y="270" fill="#0f1419" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="92" font-weight="800" letter-spacing="-1">birdclaw</text>

  <!-- Tagline (one strong line) -->
  <text x="80" y="332" fill="#0f1419" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700">Your Twitter, in a SQLite file.</text>

  <!-- Description (two lines) -->
  <text x="80" y="382" fill="#536471" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="500">Local-first archive, cached live reads, focused triage,</text>
  <text x="80" y="412" fill="#536471" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="500">and reply flows in one CLI + web app.</text>

  <!-- Multi-color accent bar -->
  <rect x="80" y="438" width="280" height="4" rx="2" fill="url(#birdySweep)"/>

  <!-- Bottom row: install pill + URL pill -->
  <g transform="translate(80 478)">
    <!-- install pill -->
    <rect x="0" y="0" width="420" height="48" rx="11" fill="#0f1419"/>
    <text x="20" y="32" fill="#71c9f8" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="500">$</text>
    <text x="42" y="32" fill="#e7eef6" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="600">brew install steipete/tap/birdclaw</text>

    <!-- URL pill -->
    <rect x="440" y="0" width="150" height="48" rx="11" fill="#ffffff" stroke="#cfd9de"/>
    <text x="515" y="32" fill="#1d9bf0" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="700" text-anchor="middle">birdclaw.sh</text>
  </g>

  <!-- Right-side terminal mockup -->
  <g transform="translate(670 142)" filter="url(#shadow)">
    <rect x="0" y="0" width="464" height="346" rx="20" fill="url(#panel)"/>
    <rect x="0" y="0" width="464" height="42" rx="20" fill="url(#panelBar)"/>
    <rect x="0" y="22" width="464" height="20" fill="url(#panelBar)"/>
    <circle cx="24" cy="21" r="6" fill="#f4212e"/>
    <circle cx="46" cy="21" r="6" fill="#ffd400"/>
    <circle cx="68" cy="21" r="6" fill="#1d9bf0"/>
    <text x="232" y="27" fill="#8b98a5" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="500" text-anchor="middle">birdclaw — @steipete</text>

    <!-- Terminal content -->
    <text x="22" y="80" fill="#71c9f8" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600">$ birdclaw search tweets "local-first" --liked</text>
    <text x="22" y="110" fill="#cfd9de" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">2024-08-12  @rauchg     local-first beats…   ★ 412</text>
    <text x="22" y="132" fill="#cfd9de" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">2023-11-04  @geoffreylitt  CRDTs &amp; you      ★ 198</text>
    <text x="22" y="154" fill="#cfd9de" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">2022-06-19  @inkandswitch  ink &amp; switch     ★ 1.2k</text>

    <text x="22" y="194" fill="#71c9f8" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="600">$ birdclaw inbox --score --hide-low-signal</text>

    <rect x="22" y="212" width="420" height="118" rx="10" fill="#04090f" stroke="#1c2a3a"/>
    <text x="38" y="238" fill="#ffd400" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">{</text>
    <text x="54" y="258" fill="#a48cff" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">"mentions": [</text>
    <text x="74" y="278" fill="#5fd29a" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">{ "from": "@dhh",   "score": 0.94, "kind": "reply" },</text>
    <text x="74" y="298" fill="#5fd29a" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">{ "from": "@swyx",  "score": 0.81, "kind": "quote" }</text>
    <text x="54" y="318" fill="#a48cff" font-family="JetBrains Mono, SFMono-Regular, Menlo, monospace" font-size="13">]</text>
  </g>

  <!-- Service pills below terminal -->
  <g transform="translate(670 514)" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" font-weight="600">
    <g>
      <rect x="0" y="0" width="76" height="30" rx="15" fill="#ffffff" stroke="#cfd9de"/>
      <text x="38" y="20" fill="#1d9bf0" text-anchor="middle">Tweets</text>
    </g>
    <g transform="translate(88 0)">
      <rect x="0" y="0" width="62" height="30" rx="15" fill="#ffffff" stroke="#cfd9de"/>
      <text x="31" y="20" fill="#f4212e" text-anchor="middle">Likes</text>
    </g>
    <g transform="translate(162 0)">
      <rect x="0" y="0" width="100" height="30" rx="15" fill="#ffffff" stroke="#cfd9de"/>
      <text x="50" y="20" fill="#1a8cd8" text-anchor="middle">Bookmarks</text>
    </g>
    <g transform="translate(274 0)">
      <rect x="0" y="0" width="56" height="30" rx="15" fill="#ffffff" stroke="#cfd9de"/>
      <text x="28" y="20" fill="#1d9bf0" text-anchor="middle">DMs</text>
    </g>
    <g transform="translate(342 0)">
      <rect x="0" y="0" width="92" height="30" rx="15" fill="#ffffff" stroke="#cfd9de"/>
      <text x="46" y="20" fill="#0a8a4e" text-anchor="middle">Mentions</text>
    </g>
  </g>
</svg>
